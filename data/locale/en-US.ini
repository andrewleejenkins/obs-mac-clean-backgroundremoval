ProcScale="Processing scale (motion tracking)"
ProcScale.Description="Runs the segmentation on a downscaled copy of the frame. Lower = faster inference, so the mask keeps up better when you move quickly; higher = more edge detail. The output stays full resolution. 0.5 is a good balance."
Protect.Enabled="Keep a protected region (e.g. microphone)"
Protect.Description="Forces a fixed rectangle to always stay in the foreground, even when the person-segmentation model would remove it. Useful for a desk or boom microphone in front of you. Coordinates are a fraction of the frame, measured from the top-left corner."
Protect.CropLeft="Crop left edge in (0-1)"
Protect.CropRight="Crop right edge in (0-1)"
Protect.CropTop="Crop top edge in (0-1)"
Protect.CropBottom="Crop bottom edge in (0-1)"
Protect.Feather="Protected region: edge feather"
Protect.AlwaysOutline="Always show region outline"
Protect.AlwaysOutline.Description="The magenta outline normally appears automatically while you adjust the crop sliders, then hides a few seconds later (so you don't have to toggle it before going live). Enable this to keep it on at all times."
